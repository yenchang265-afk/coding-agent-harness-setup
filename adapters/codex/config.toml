# Harness-managed Codex CLI config block (appended to ~/.codex/config.toml by
# the bootstrap, between the >>> harness-managed >>> markers).
#
# Codex auto-discovers global guidance at ~/.codex/AGENTS.md and custom prompts
# at ~/.codex/prompts/ — both are populated by the bootstrap, so there is little
# to set here. Model/provider settings are intentionally OUT OF SCOPE (handled
# by your existing connectivity setup); add them above this block if needed.

# Keep the full global AGENTS.md in context (raise if your rules grow large).
project_doc_max_bytes = 65536

# Example notify hook (Codex's only hook). Uncomment and point at a script if
# you want desktop notifications when Codex finishes / needs input:
# notify = ["bash", "-lc", "echo codex: $1"]
