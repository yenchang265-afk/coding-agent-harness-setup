# Profiles: a named preset that expands to a bundle set, for picking your side
# of the stack. Use it with:  ./install.sh --profile=<name>
# or put "profile <name>" in your harness.selection manifest.
#
# Format:  <profile-name> <bundle> [<bundle> ...]
#   '#' starts a comment; blank lines ignored.
# --bundles=... on the command line overrides any profile.
#
# Keep "core" in every profile — it carries the global rules and shared hooks.

frontend   core frontend-nextjs
backend    core backend-spring data-platform
fullstack  core frontend-nextjs backend-spring data-platform
